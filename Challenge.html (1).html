<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room – Mastery Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .mono { font-family: 'Roboto Mono', monospace; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .modal-content { max-height: 90vh; overflow-y: auto; width: 95%; max-width: 600px; }
        .stamp-button { border: 2px solid #334155; background-color: #1e293b; color: #475569; padding: 0.8rem; border-radius: 0.75rem; text-align: center; font-weight: 800; opacity: 0.6; transition: all 0.3s; }
        .stamp-button.unlocked { border-color: #10b981; background-color: #064e3b; color: #10b981; opacity: 1; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .input-challenge { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; text-align: center; margin-top: 5px; }
        .drop-zone { min-height: 60px; background: #1e293b; border: 2px dashed #475569; border-radius: 10px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; margin-bottom: 15px; }
        .drag-item { background: #3b82f6; color: white; padding: 8px 15px; border-radius: 6px; cursor: grab; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight">PASSPORT CHALLENGE</h1>
                <p class="text-slate-400 text-sm">Level: Pre-A1 Mastery</p>
            </div>
            <div id="progress-text" class="bg-blue-600/20 text-blue-400 border border-blue-500/50 px-4 py-2 rounded-full mono font-bold text-center">
                0 / 8 STAMPS
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-10">
            <div id="stamp-1" class="stamp-button">1</div>
            <div id="stamp-2" class="stamp-button">2</div>
            <div id="stamp-3" class="stamp-button">3</div>
            <div id="stamp-4" class="stamp-button">4</div>
            <div id="stamp-5" class="stamp-button">5</div>
            <div id="stamp-6" class="stamp-button">6</div>
            <div id="stamp-7" class="stamp-button">7</div>
            <div id="stamp-8" class="stamp-button">8</div>
        </div>
        
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-700 shadow-inner">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-3 tracking-widest text-center">Enter Secret Keyword</label>
            <div class="flex space-x-3">
                <input type="text" id="keywordInput" class="mono flex-grow bg-slate-800 border border-slate-700 text-white rounded-xl p-4 text-center text-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="??????">
                <button onclick="openChallenge()" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-8 rounded-xl transition-all">GO</button>
            </div>
        </div>
    </div>

    <div id="challenge-modal" class="modal">
        <div class="modal-content bg-slate-800 rounded-3xl p-8 border border-blue-500 shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-black text-blue-400 mb-6 uppercase text-center border-b border-slate-700 pb-4"></h2>
            <div id="modal-body" class="space-y-6 text-slate-200 mb-8"></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal()" class="bg-slate-700 text-white font-bold py-4 rounded-xl">CANCEL</button>
                <button onclick="checkInternalAnswer()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl transition">CHECK</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica del Reto 4: Secuencial
        let currentStep4 = 0;
        const step4Content = [
            { words: ['your', 'is', 'What', 'name', '?'], correct: 'whatisyourname?' },
            { words: ['from', 'are', 'Where', 'you', '?'], correct: 'whereareyoufrom?' },
            { words: ['old', 'you', 'How', 'are', '?'], correct: 'howoldareyou?' },
            { words: ['mother', 'is', 'Who', 'your', '?'], correct: 'whoisyourmother?' }
        ];

        const challenges = {
            "country": {
                index: 1, title: "Stamp 1: Countries",
                html: `<div class="space-y-4">
                        <div>1. I am in South America. I love Tango and Messi. <input type="text" id="c1" class="input-challenge"></div>
                        <div>2. I am in South America. I have coffee and Shakira. <input type="text" id="c2" class="input-challenge"></div>
                        <div>3. I am in South America. I have Machu Picchu. <input type="text" id="c3" class="input-challenge"></div>
                        <div>4. I am in South America. I love Samba and Neymar. <input type="text" id="c4" class="input-challenge"></div>
                       </div>`,
                check: () => ['argentina', 'colombia', 'peru', 'brazil'].every((v, i) => document.getElementById(`c${i+1}`).value.toLowerCase().trim() === v)
            },
            "name": {
                index: 2, title: "Stamp 2: Greetings",
                html: `<div class="space-y-3 text-center">
                        <p>1. What <input type="text" id="n1" class="w-20 bg-slate-900 border border-slate-600"> is your name?</p>
                        <p>2. I <input type="text" id="n2" class="w-20 bg-slate-900 border border-slate-600"> Daniel.</p>
                        <p>3. Where <input type="text" id="n3" class="w-20 bg-slate-900 border border-slate-600"> are you from?</p>
                        <p>4. How <input type="text" id="n4" class="w-20 bg-slate-900 border border-slate-600"> old are you?</p>
                       </div>`,
                check: () => ['is', 'am', 'are', 'old'].every((v, i) => document.getElementById(`n${i+1}`).value.toLowerCase().trim() === v)
            },
            "job": {
                index: 3, title: "Stamp 3: Reading Jobs",
                html: `<div class="bg-slate-900 p-4 rounded-xl text-sm italic space-y-3">
                        <p>"My name is Mary. I work in a hospital. I am a nurse."</p>
                        <p>"My name is Mr. Smith. I work in a school. I am a teacher."</p>
                       </div>
                       <div class="space-y-2">
                        1. Where does Mary work? <input type="text" id="j1" class="input-challenge">
                        2. What is Mary's job? <input type="text" id="j2" class="input-challenge">
                        3. Where does Mr. Smith work? <input type="text" id="j3" class="input-challenge">
                        4. What is his job? <input type="text" id="j4" class="input-challenge">
                       </div>`,
                check: () => ['hospital', 'nurse', 'school', 'teacher'].every((v, i) => document.getElementById(`j${i+1}`).value.toLowerCase().trim() === v)
            },
            "family": {
                index: 4, title: "Stamp 4: Drag & Drop",
                html: `<div id="drag-master">
                        <p class="text-center mb-2 font-bold text-blue-400">Question <span id="step-count">1</span> of 4</p>
                        <div id="words" class="flex flex-wrap gap-2 justify-center mb-4"></div>
                        <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" id="drop-box"></div>
                       </div>`,
                onOpen: () => renderStep4(),
                check: () => {
                    const ok = document.getElementById('drop-box').innerText.replace(/\s/g, '').toLowerCase() === step4Content[currentStep4].correct;
                    if(ok && currentStep4 < 3) {
                        currentStep4++;
                        renderStep4();
                        return "step";
                    }
                    return ok && currentStep4 === 3;
                }
            },
            "number": {
                index: 5, title: "Stamp 5: Number Words",
                html: `<div class="grid grid-cols-2 gap-4">
                        <div>14: <input type="text" id="num1" class="input-challenge"></div>
                        <div>27: <input type="text" id="num2" class="input-challenge"></div>
                        <div>88: <input type="text" id="num3" class="input-challenge"></div>
                        <div>10: <input type="text" id="num4" class="input-challenge"></div>
                       </div>`,
                check: () => ['fourteen', 'twenty-seven', 'eighty-eight', 'ten'].every((v, i) => document.getElementById(`num${i+1}`).value.toLowerCase().trim() === v)
            },
            "uncle": {
                index: 6, title: "Stamp 6: Family Logic",
                html: `<div class="space-y-4">
                        <div>1. My mother's brother is my... <input type="text" id="u1" class="input-challenge"></div>
                        <div>2. My father's sister is my... <input type="text" id="u2" class="input-challenge"></div>
                        <div>3. My father's mother is my... <input type="text" id="u3" class="input-challenge"></div>
                        <div>4. My mother's father is my... <input type="text" id="u4" class="input-challenge"></div>
                       </div>`,
                check: () => ['uncle', 'aunt', 'grandmother', 'grandfather'].every((v, i) => document.getElementById(`u${i+1}`).value.toLowerCase().trim() === v)
            },
            "text": {
                index: 7, title: "Stamp 7: Laura's Family",
                html: `<div class="bg-slate-900 p-4 rounded-xl text-sm italic mb-4 text-center">
                        "Hello! I am Laura. I am sixteen. Tom is my brother. My mom is a teacher and my dad is an engineer."
                       </div>
                       <div class="grid grid-cols-2 gap-4">
                        <div>Age: <input type="text" id="l1" class="input-challenge"></div>
                        <div>Brother: <input type="text" id="l2" class="input-challenge"></div>
                        <div>Mom job: <input type="text" id="l3" class="input-challenge"></div>
                        <div>Dad job: <input type="text" id="l4" class="input-challenge"></div>
                       </div>`,
                check: () => ['sixteen', 'tom', 'teacher', 'engineer'].every((v, i) => document.getElementById(`l${i+1}`).value.toLowerCase().trim() === v)
            },
            "id": {
                index: 8, title: "Stamp 8: Verb TO BE",
                html: `<div class="space-y-3 text-center">
                        <div>1. I <select id="v1"><option>?</option><option>am</option><option>is</option></select> happy.</div>
                        <div>2. She <select id="v2"><option>?</option><option>is</option><option>are</option></select> a girl.</div>
                        <div>3. They <select id="v3"><option>?</option><option>is</option><option>are</option></select> cold.</div>
                        <div>4. It <select id="v4"><option>?</option><option>is</option><option>am</option></select> a cat.</div>
                        <div>5. We <select id="v5"><option>?</option><option>am</option><option>are</option></select> friends.</div>
                        <div>6. You <select id="v6"><option>?</option><option>is</option><option>are</option></select> tall.</div>
                        <div>7. He <select id="v7"><option>?</option><option>is</option><option>are</option></select> 10.</div>
                        <div>8. Apple <select id="v8"><option>?</option><option>is</option><option>are</option></select> red.</div>
                       </div>`,
                check: () => ['am', 'is', 'are', 'is', 'are', 'are', 'is', 'is'].every((v, i) => document.getElementById(`v${i+1}`).value === v)
            }
        };

        let currentKey = null;

        function renderStep4() {
            document.getElementById('step-count').innerText = currentStep4 + 1;
            document.getElementById('drop-box').innerHTML = "";
            const wordContainer = document.getElementById('words');
            wordContainer.innerHTML = "";
            step4Content[currentStep4].words.sort(() => Math.random() - 0.5).forEach((w, i) => {
                const span = document.createElement('span');
                span.className = "drag-item";
                span.draggable = true;
                span.id = `drg-${i}`;
                span.innerText = w;
                span.ondragstart = drag;
                wordContainer.appendChild(span);
            });
        }

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            ev.target.appendChild(document.getElementById(data));
        }

        function openChallenge() {
            const key = document.getElementById('keywordInput').value.toLowerCase().trim();
            if (challenges[key]) {
                currentKey = key;
                document.getElementById('modal-title').textContent = challenges[key].title;
                document.getElementById('modal-body').innerHTML = challenges[key].html;
                if(challenges[key].onOpen) challenges[key].onOpen();
                document.getElementById('challenge-modal').style.display = 'flex';
            } else { alert("❌ Keyword incorrect!"); }
        }

        function checkInternalAnswer() {
            const result = challenges[currentKey].check();
            if (result === "step") return; // Siguiente paso del drag & drop
            if (result === true) {
                document.getElementById(`stamp-${challenges[currentKey].index}`).classList.add('unlocked');
                const count = document.querySelectorAll('.stamp-button.unlocked').length;
                document.getElementById('progress-text').textContent = `${count} / 8 STAMPS`;
                closeModal();
                if(count === 8) alert("🏆 PASSPORT COMPLETED! CONGRATULATIONS!");
            } else { alert("⚠️ Check your answers!"); }
        }

        function closeModal() { document.getElementById('challenge-modal').style.display = 'none'; }
    </script>
</body>
</html>
